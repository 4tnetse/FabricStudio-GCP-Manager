<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FabricStudio{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fortinet: '#d92b2b',
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #0f1117; }
  </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color:#0f1117;">

  <!-- Top bar -->
  <header class="border-b border-slate-800 px-6 py-3 flex items-center gap-3">
    <span class="text-lg font-bold tracking-tight" style="color:#d92b2b;">FabricStudio</span>
    {% if workshop_name %}
    <span class="text-slate-600 text-sm">/</span>
    <span class="text-slate-400 text-sm">{{ workshop_name }}</span>
    {% endif %}
  </header>

  <!-- Main content -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-[480px]">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
