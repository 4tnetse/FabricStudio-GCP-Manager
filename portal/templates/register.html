{% extends "base.html" %}

{% block title %}Workshop Registration{% endblock %}

{% block content %}
<div class="rounded-xl border border-slate-800 bg-slate-900 shadow-2xl p-8 space-y-6">
  <div>
    <h1 class="text-xl font-semibold text-slate-100">Workshop Registration</h1>
    <p class="mt-1 text-sm text-slate-500">Enter your details to receive your instance credentials.</p>
  </div>

  {% if error %}
  <div class="rounded-lg border px-4 py-3 text-sm
    {% if 'No slots' in error %}
      border-red-700/50 bg-red-900/20 text-red-400
    {% else %}
      border-amber-700/50 bg-amber-900/20 text-amber-300
    {% endif %}
  ">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/register" class="space-y-4">
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1" for="name">Full name</label>
      <input
        id="name" name="name" type="text" required autocomplete="name"
        class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-slate-500 placeholder:text-slate-600"
        placeholder="Jane Smith"
      />
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1" for="email">Email address</label>
      <input
        id="email" name="email" type="email" required autocomplete="email"
        class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-slate-500 placeholder:text-slate-600"
        placeholder="jane@example.com"
      />
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1" for="company">Company</label>
      <input
        id="company" name="company" type="text" required autocomplete="organization"
        class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-slate-500 placeholder:text-slate-600"
        placeholder="Acme Corp"
      />
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1" for="passphrase">Workshop passphrase</label>
      <input
        id="passphrase" name="passphrase" type="password" required autocomplete="off"
        class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-slate-500 placeholder:text-slate-600"
        placeholder="Provided by your instructor"
      />
    </div>

    <button
      type="submit"
      class="w-full py-2.5 rounded-lg text-sm font-medium text-white transition-opacity hover:opacity-90 active:opacity-75"
      style="background-color:#d92b2b;"
    >
      Register
    </button>
  </form>
</div>
{% endblock %}
