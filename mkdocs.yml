site_name: FS GCP Manager Doc
site_description: Web-based management interface for Fabric Studio instances on Google Cloud Platform
repo_url: https://github.com/4tnetse/FabricStudio-GCP-Manager
repo_name: FabricStudio-GCP-Manager

extra_css:
  - stylesheets/security-fabric.css

extra_javascript:
  - javascripts/external-links.js

theme:
  name: material
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Upgrade: upgrade.md
  - Changelog: changelog.md
  - Configuration: configuration.md
  - Workshop Workflow: workflow.md
  - Screens:
      - Dashboard: screens/dashboard.md
      - Instances: screens/instances.md
      - Build: screens/build.md
      - Configure: screens/configure.md
      - Clone: screens/clone.md
      - Firewall: screens/firewall.md
      - Labels: screens/labels.md
      - SSH: screens/ssh.md
      - SSH Configurations: screens/configurations.md
      - Images: screens/images.md
      - Costs: screens/costs.md
      - Schedules: screens/schedules.md
      - Workshops: screens/workshops.md
      - Settings: screens/settings.md
  - Developer:
      - Application Design: dev/app-design.md
      - Scheduling Design: dev/scheduling-design.md
